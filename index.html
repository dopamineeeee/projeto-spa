<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Ferramentas</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <h1>Painel de Ferramentas</h1>
    </header>

    <main>

        <aside>

            <button data-alvo="moedas">Conversor de Moedas</button>

            <button data-alvo="imc">Cálculo IMC</button>

            <button data-alvo="temperatura">Conversor de Temperatura</button>

            <button data-alvo="velocidade">Conversor de Velocidade</button>

            <button data-alvo="massa">Conversor de Massa</button>

            <button data-alvo="regraTres">Ferramenta de Regra de Três</button>

        </aside>

        <section>

            <div class="conteiner">

                <div id="moedas" class="ferramenta">
                    <h2>Conversor de Moedas</h2>
                </div>



                <div id="imc" class="ferramenta">
                    <h2>Cálculo IMC</h2>

                    <form id="formimc">

                        <input id="peso" type="text" placeholder="Digite seu peso">
                        <input id="altura" type="number" step="0.01">
                        <button type="submit">Calcular</button>

                    </form>

                    <p id="resultado"></p>

                </div>




                <div id="temperatura" class="ferramenta">
                    <h2>Conversor de Temperatura</h2>
                </div>

                <div id="velocidade" class="ferramenta">
                    <h2>Conversor de Velocidade</h2>
                </div>

                <div id="massa" class="ferramenta">
                    <h2>Conversor de Massa</h2>
                </div>

                <div id="regraTres" class="ferramenta">
                    <h2>Ferramenta de Regra de Três</h2>
                </div>

            </div>

        </section>

    </main>

    <footer>
        <h2>Criado por Eric de Oliveira Ferreira</h2>
    </footer>

</body>
</html>
